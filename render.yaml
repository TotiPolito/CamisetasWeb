services:
  - type: web
    name: camisetas-web
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn run:app
    disk:
      name: storage
      mountPath: /opt/render/project/src/storage
      sizeGB: 10
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: SESSION_COOKIE_SECURE
        value: "1"
