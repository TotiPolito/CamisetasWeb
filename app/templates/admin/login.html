{% extends "base.html" %}

{% block title %}Login admin{% endblock %}

{% block content %}
<main class="center-layout">
    <section class="auth-card">
        <p class="eyebrow">Admin</p>
        <h1>Iniciar sesion</h1>
        <p>El publico no necesita cuenta. Este acceso es solo para administrar el stock.</p>

        <form class="auth-form" method="post" action="{{ url_for('auth.login') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <label class="field">
                <span>Usuario</span>
                <input type="text" name="username" autocomplete="username" required>
            </label>

            <label class="field">
                <span>Contrasena</span>
                <input type="password" name="password" autocomplete="current-password" required>
            </label>

            <button class="button button--primary button--block" type="submit">Entrar al panel</button>
        </form>

        <div class="auth-note">
            <strong>Acceso privado.</strong>
            <span>Configura las credenciales desde las variables de entorno del proyecto.</span>
        </div>
    </section>
</main>
{% endblock %}
